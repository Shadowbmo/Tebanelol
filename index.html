<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tebane</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    overflow: hidden;
    position: relative;
    padding: 20px;

    background-image: url("./GifTebane2.gif");
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #000;

    transition: background-image 0.4s ease-in-out;
  }

  /* camada escura e suave sobre o gif do fundo */
  body::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(rgba(5, 10, 20, 0.45), rgba(5, 10, 20, 0.65)),
      radial-gradient(circle at top, rgba(90, 140, 255, 0.12), transparent 35%);
    z-index: 0;
    pointer-events: none;
  }

  .profile-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    padding: 32px 24px;
    border-radius: 24px;
    background: linear-gradient(
      135deg,
      rgba(255, 255, 255, 0.07) 0%,
      rgba(255, 255, 255, 0.03) 30%,
      rgba(0, 70, 140, 0.25) 65%,
      rgba(0, 140, 255, 0.35) 100%
    );
    border: 1px solid rgba(255, 255, 255, 0.10);
    box-shadow:
      0 10px 40px rgba(0, 0, 0, 0.45),
      0 0 30px rgba(0, 140, 255, 0.18);
    text-align: center;
  }

  .avatar {
    width: 110px;
    height: 110px;
    margin: 0 auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.08);
  }

  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .username {
    font-size: 1.6rem;
    font-weight: 700;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .bio {
    font-size: 0.95rem;
    color: rgba(255, 255, 255, 0.78);
    line-height: 1.5;
    margin-bottom: 24px;
  }

  .links {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .links a {
    text-decoration: none;
    color: #fff;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.07);
    border: 1px solid rgba(255, 255, 255, 0.08);
    transition: 0.25s ease;
    font-weight: 500;
    box-shadow: inset 0 0 0 rgba(255,255,255,0);
  }

  .links a:hover {
    transform: translateY(-2px) scale(1.01);
    background: rgba(255, 255, 255, 0.11);
    border-color: rgba(255, 255, 255, 0.18);
    box-shadow:
      0 8px 20px rgba(0, 0, 0, 0.25),
      0 0 18px rgba(0, 140, 255, 0.15);
  }

  .socials {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 22px;
  }

  .socials a {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    background: rgba(255, 255, 255, 0.07);
    color: #fff;
    text-decoration: none;
    font-size: 1rem;
    transition: 0.25s ease;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .socials a:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.12);
  }

  .bg-switcher {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
  }

  .bg-button {
    padding: 12px 18px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-weight: 600;
    color: #fff;
    background: linear-gradient(135deg, rgba(0, 120, 255, 0.55), rgba(0, 70, 180, 0.75));
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
    transition: 0.25s ease;
  }

  .bg-button:hover {
    transform: translateY(-2px) scale(1.02);
    filter: brightness(1.08);
  }

  .bg-label {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.75);
  }

  @media (max-width: 480px) {
    .profile-card {
      padding: 26px 18px;
      border-radius: 20px;
      max-width: 360px;
    }

    .username {
      font-size: 1.35rem;
    }

    .bio {
      font-size: 0.9rem;
    }
  }
</style>
<body>

  <div class="profile-card">
    <div class="avatar">
      <img src="./Tebanefoto.webp" alt="Avatar">
    </div>

    <h1 class="username">@Tebanelol</h1>
    <p class="bio">
      Oi, eu sou o Tebane faço lives 1 vez na vida e 1 na morte. <br>✦ A partir das 01:30 ✦
    </p>

    <div class="links">
      <a href="https://discord.com/invite/C5Eahbr44W" target="_blank">Discord</a>
      <a href="https://livepix.gg/tebane" target="_blank">Live Pix</a>
      <a href="https://www.tiktok.com/@tebanelol?lang=pt-BR" target="_blank">TikTok</a>
    </div>

    <div class="socials">
      <a href="https://discord.com/invite/C5Eahbr44W" target="_blank">
        <i class="fa-brands fa-discord"></i>
      </a>
      <a href="https://www.tiktok.com/@tebanelol?lang=pt-BR" target="_blank">
        <i class="fa-brands fa-tiktok"></i>
      </a>
    </div>

    <div class="bg-switcher">
      <button class="bg-button" id="toggleBgBtn">Trocar fundo</button>
      <span class="bg-label" id="bgName">Fundo atual: GifTebane2</span>
    </div>
  </div>

  <script>
    const backgrounds = [
      { file: "./GifTebane2.gif", name: "GifTebane2" },
      { file: "./Claudete.gif", name: "Claudete" },
      { file: "./Aura.gif", name: "Aura" }
    ];

    let currentBg = 0;

    const body = document.body;
    const toggleBgBtn = document.getElementById("toggleBgBtn");
    const bgName = document.getElementById("bgName");

    toggleBgBtn.addEventListener("click", () => {
      currentBg = (currentBg + 1) % backgrounds.length;
      body.style.backgroundImage = `url("${backgrounds[currentBg].file}")`;
      bgName.textContent = `Fundo atual: ${backgrounds[currentBg].name}`;
    });
  </script>

</body>
</html>
